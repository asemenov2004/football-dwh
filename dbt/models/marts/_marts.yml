version: 2

models:
  - name: mart_league_table
    description: "Турнирная таблица: позиция команды в лиге за сезон + xG/PPDA-метрики."
    columns:
      - name: team_bk
        tests: [not_null]
      - name: league_id
        tests: [not_null]
      - name: season_year
        tests: [not_null]
      - name: position
        tests: [not_null]
      - name: pts
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [team_bk, league_id, season_year]

  - name: mart_top_scorers
    description: "Топ-скореры: агрегат xG/голов на (player, league, season) с teams_concat для трансферов."
    columns:
      - name: player_bk
        tests: [not_null]
      - name: league_id
        tests: [not_null]
      - name: season_year
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [player_bk, league_id, season_year]
