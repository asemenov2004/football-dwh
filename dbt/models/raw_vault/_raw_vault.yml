version: 2

models:

  # ─── HUBS ────────────────────────────────────────────────────────────────────

  - name: hub_team
    description: "Hub: уникальные команды. BK = team_bk ('understat|{lower(team_title)}')."
    columns:
      - name: hub_team_hk
        description: "MD5-хеш бизнес-ключа команды (PK)"
        tests:
          - not_null
          - unique
      - name: team_bk
        tests:
          - not_null
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: hub_competition
    description: "Hub: уникальные турниры. BK = league_id slug. Источники: SB + Understat."
    columns:
      - name: hub_competition_hk
        description: "MD5-хеш league_id slug (PK)"
        tests:
          - not_null
          - unique
      - name: league_id
        tests:
          - not_null
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: hub_season
    description: "Hub: уникальные сезоны. BK = season_year (год). Источник: Understat."
    columns:
      - name: hub_season_hk
        description: "MD5-хеш года сезона (PK)"
        tests:
          - not_null
          - unique
      - name: season_year
        tests:
          - not_null
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: hub_match
    description: "Hub: уникальные матчи. BK = match_bk ('sb|{match_id}' или 'understat|{match_id}'). SB и Understat — разные записи."
    columns:
      - name: hub_match_hk
        description: "MD5-хеш бизнес-ключа матча (PK)"
        tests:
          - not_null
          - unique
      - name: match_bk
        tests:
          - not_null
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: hub_player
    description: "Hub: уникальные игроки. BK = player_bk ('understat|{player_id}'). Источник: Understat."
    columns:
      - name: hub_player_hk
        description: "MD5-хеш бизнес-ключа игрока (PK)"
        tests:
          - not_null
          - unique
      - name: player_bk
        tests:
          - not_null
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  # ─── LINKS ───────────────────────────────────────────────────────────────────

  - name: lnk_match_team
    description: "Link: матч ↔ команда с ролью (home/away). Источник: Understat."
    columns:
      - name: lnk_match_team_hk
        description: "MD5-хеш (hub_match_hk || hub_team_hk || team_role) (PK)"
        tests:
          - not_null
          - unique
      - name: hub_match_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_match')
              field: hub_match_hk
      - name: hub_team_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_team')
              field: hub_team_hk
      - name: team_role
        tests:
          - not_null
          - accepted_values:
              values: ["home", "away"]
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: lnk_player_team
    description: "Link: игрок ↔ команда ↔ сезон (Understat). Гранулярность — срез на конец сезона."
    columns:
      - name: lnk_player_team_hk
        description: "MD5-хеш (hub_player_hk || hub_team_hk || hub_season_hk) (PK)"
        tests:
          - not_null
          - unique
      - name: hub_player_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_player')
              field: hub_player_hk
      - name: hub_team_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_team')
              field: hub_team_hk
      - name: hub_season_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_season')
              field: hub_season_hk
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: lnk_match_competition_season
    description: "Link: матч ↔ турнир ↔ сезон. Источник: Understat."
    columns:
      - name: lnk_match_comp_season_hk
        description: "MD5-хеш (hub_match_hk || hub_competition_hk || hub_season_hk) (PK)"
        tests:
          - not_null
          - unique
      - name: hub_match_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_match')
              field: hub_match_hk
      - name: hub_competition_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_competition')
              field: hub_competition_hk
      - name: hub_season_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_season')
              field: hub_season_hk
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: lnk_match_same_as
    description: "Same-as link: один матч в Understat ↔ в StatsBomb. Fuzzy по (date, league, normalized teams)."
    columns:
      - name: lnk_match_same_as_hk
        description: "MD5-хеш (hub_match_hk_understat || hub_match_hk_sb) (PK)"
        tests:
          - not_null
          - unique
      - name: hub_match_hk_understat
        tests:
          - not_null
          - relationships:
              to: ref('hub_match')
              field: hub_match_hk
      - name: hub_match_hk_sb
        tests:
          - not_null
          - relationships:
              to: ref('hub_match')
              field: hub_match_hk
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: lnk_team_competition_season
    description: "Link: команда ↔ турнир ↔ сезон. Участие в соревновании. Источник: Understat."
    columns:
      - name: lnk_team_comp_season_hk
        description: "MD5-хеш (hub_team_hk || hub_competition_hk || hub_season_hk) (PK)"
        tests:
          - not_null
          - unique
      - name: hub_team_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_team')
              field: hub_team_hk
      - name: hub_competition_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_competition')
              field: hub_competition_hk
      - name: hub_season_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_season')
              field: hub_season_hk
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  # ─── SATELLITES ──────────────────────────────────────────────────────────────

  - name: sat_team_details
    description: "Satellite: описательные атрибуты команды (название, лига). Источник: Understat. Append-only с hashdiff."
    columns:
      - name: hub_team_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_team')
              field: hub_team_hk
      - name: sat_team_details_hashdiff
        tests:
          - not_null
      - name: team_title
        tests:
          - not_null
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: sat_match_score
    description: "Satellite: счёт и статус матча из StatsBomb. Append-only с hashdiff."
    columns:
      - name: hub_match_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_match')
              field: hub_match_hk
      - name: sat_match_score_hashdiff
        tests:
          - not_null
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: sat_player_xg
    description: "Satellite: xG-статистика игрока за сезон в лиге (Understat). BK='understat|{id}'."
    columns:
      - name: hub_player_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_player')
              field: hub_player_hk
      - name: sat_player_xg_hashdiff
        tests:
          - not_null
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: sat_team_xg
    description: "Satellite: xG/PPDA-статистика команды за сезон в лиге (Understat). BK='understat|{name}'."
    columns:
      - name: hub_team_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_team')
              field: hub_team_hk
      - name: sat_team_xg_hashdiff
        tests:
          - not_null
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: sat_match_score_understat
    description: "Satellite: счёт и дата Understat-матча. Append-only с hashdiff."
    columns:
      - name: hub_match_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_match')
              field: hub_match_hk
      - name: sat_match_score_understat_hashdiff
        tests:
          - not_null
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null

  - name: sat_match_xg
    description: "Satellite: xG на уровне матча (Understat). home_xg/away_xg. Линковка с SB в Business Vault."
    columns:
      - name: hub_match_hk
        tests:
          - not_null
          - relationships:
              to: ref('hub_match')
              field: hub_match_hk
      - name: sat_match_xg_hashdiff
        tests:
          - not_null
      - name: ldts
        tests:
          - not_null
      - name: rsrc
        tests:
          - not_null
