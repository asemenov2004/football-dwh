# Football DWH — единый Docker Compose стек.
# Поднять: cp .env.example .env && docker compose up -d
# Сервисы:
#   postgres     — метаданные Airflow + DWH (две БД в одном инстансе)
#   minio        — raw lake (S3-compatible)
#   clickhouse   — data marts
#   airflow-*    — webserver + scheduler + init (LocalExecutor)
#   superset-*   — BI + init (поднят заранее для знакомства, наполняется на Этапе 6)
#   spark-*      — master + worker Standalone (используется на Этапе 7)

x-airflow-common: &airflow-common
  image: football_dwh/airflow:local
  build:
    context: ./docker/airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_AIRFLOW_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    # Чтобы DAG-и видели ingestion/ и stage/ модули.
    PYTHONPATH: "/opt/airflow:/opt/airflow/ingestion:/opt/airflow/stage"
    # Этап 1: ingestion читает эти переменные напрямую из окружения
    MINIO_ENDPOINT: "minio:9000"
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    # Этап 2: stage-loader ходит в Postgres DWH
    POSTGRES_HOST: "postgres"
    POSTGRES_INTERNAL_PORT: "5432"
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DWH_DB: ${POSTGRES_DWH_DB}
    # Этап 3: dbt — профили и таргет
    DBT_PROFILES_DIR: "/opt/airflow/dbt"
    DBT_TARGET: "prod"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./ingestion:/opt/airflow/ingestion
    - ./stage:/opt/airflow/stage
    - ./dbt:/opt/airflow/dbt
    - ./data/airflow/logs:/opt/airflow/logs
    - ./data/airflow/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ---------- Postgres (Airflow metadata + DWH) ----------
  postgres:
    image: postgres:16.4
    container_name: football_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_AIRFLOW_DB: ${POSTGRES_AIRFLOW_DB}
      POSTGRES_DWH_DB: ${POSTGRES_DWH_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/10-init-multiple-databases.sh:ro
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
    networks: [football_net]
    restart: unless-stopped

  # ---------- Postgres DWH: init (stage schema + tables) ----------
  # Запускается каждый раз после старта postgres, но сами DDL идемпотентны
  # (CREATE SCHEMA/TABLE IF NOT EXISTS). Монтируем stage/ddl в контейнер и
  # применяем psql -f. Ошибки падают сразу (ON_ERROR_STOP=1).
  dwh-init:
    image: postgres:16.4
    container_name: football_dwh_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DWH_DB}
    volumes:
      - ./stage/ddl:/ddl:ro
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        for f in /ddl/*.sql; do
          echo "applying $$f"
          psql -v ON_ERROR_STOP=1 -f "$$f"
        done
    restart: "no"
    networks: [football_net]

  # ---------- MinIO (raw lake) ----------
  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: football_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
    networks: [football_net]
    restart: unless-stopped

  # ---------- MinIO: init (создание бакетов) ----------
  # Один раз при старте стека создаёт бакеты под raw lake.
  # Идемпотентно: mc mb --ignore-existing не падает, если бакет уже есть.
  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    container_name: football_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/raw-statsbomb
        mc mb --ignore-existing local/raw-understat
        mc mb --ignore-existing local/marts
        mc ls local/
    restart: "no"
    networks: [football_net]

  # ---------- ClickHouse (data marts) ----------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: football_clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      # named volumes вместо bind-mount на NTFS — иначе rename падает с
      # Permission denied при INSERT (CH создаёт tmp_insert_... и переименовывает).
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "${CLICKHOUSE_HTTP_PORT}:8123"
      - "${CLICKHOUSE_NATIVE_PORT}:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2g
    networks: [football_net]
    restart: unless-stopped

  # ---------- ClickHouse: init (DDL для март-витрин) ----------
  # Применяет stage/ddl/clickhouse_marts.sql при старте стека.
  # Идемпотентно (CREATE DATABASE/TABLE IF NOT EXISTS).
  clickhouse-init:
    image: clickhouse/clickhouse-server:24.8
    container_name: football_clickhouse_init
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - ./stage/ddl:/ddl:ro
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        clickhouse-client \
          --host clickhouse --port 9000 \
          --user "$$CLICKHOUSE_USER" --password "$$CLICKHOUSE_PASSWORD" \
          --multiquery < /ddl/clickhouse_marts.sql
        echo "clickhouse_marts.sql applied"
    restart: "no"
    networks: [football_net]

  # ---------- Airflow: init (миграции + admin user) ----------
  airflow-init:
    <<: *airflow-common
    container_name: football_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        mkdir -p /opt/airflow/logs /opt/airflow/plugins
        airflow db migrate
        airflow users list | grep -q "${AIRFLOW_ADMIN_USER}" || \
          airflow users create \
            --username "${AIRFLOW_ADMIN_USER}" \
            --password "${AIRFLOW_ADMIN_PASSWORD}" \
            --firstname Admin --lastname User \
            --role Admin --email admin@example.com
    restart: "no"
    networks: [football_net]

  # ---------- Airflow: webserver ----------
  airflow-webserver:
    <<: *airflow-common
    container_name: football_airflow_webserver
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks: [football_net]
    restart: unless-stopped

  # ---------- Airflow: scheduler ----------
  airflow-scheduler:
    <<: *airflow-common
    container_name: football_airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1500m
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks: [football_net]
    restart: unless-stopped

  # ---------- Superset: init ----------
  # $$VAR экранирует переменную от compose — подстановка идёт из env контейнера bash'ом.
  superset-init:
    image: football_dwh/superset:local
    build:
      context: ./docker/superset
      dockerfile: Dockerfile
    container_name: football_superset_init
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
    volumes:
      - ./data/superset:/app/superset_home
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        superset db upgrade
        superset fab list-users | grep -q "$$SUPERSET_ADMIN_USER" || \
          superset fab create-admin \
            --username "$$SUPERSET_ADMIN_USER" \
            --password "$$SUPERSET_ADMIN_PASSWORD" \
            --firstname Admin --lastname User \
            --email admin@example.com
        superset init
    restart: "no"
    networks: [football_net]

  # ---------- Superset: webserver ----------
  superset:
    image: football_dwh/superset:local
    build:
      context: ./docker/superset
      dockerfile: Dockerfile
    container_name: football_superset
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    volumes:
      - ./data/superset:/app/superset_home
    ports:
      - "${SUPERSET_PORT}:8088"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      superset-init:
        condition: service_completed_successfully
    networks: [football_net]
    restart: unless-stopped

  # ---------- Spark: master ----------
  # apache/spark образ без обвязки Bitnami — процессы запускаем через spark-class явно.
  spark-master:
    image: apache/spark:3.5.8
    container_name: football_spark_master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host 0.0.0.0 --port 7077 --webui-port 8080
    ports:
      - "${SPARK_MASTER_PORT}:7077"
      - "${SPARK_MASTER_UI_PORT}:8080"
    volumes:
      - ./spark:/opt/spark/jobs
    deploy:
      resources:
        limits:
          memory: 512m
    networks: [football_net]
    restart: unless-stopped

  # ---------- Spark: worker ----------
  spark-worker:
    image: apache/spark:3.5.8
    container_name: football_spark_worker
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --webui-port 8081 --cores 2 --memory 1500m
    ports:
      - "${SPARK_WORKER_UI_PORT}:8081"
    volumes:
      - ./spark:/opt/spark/jobs
    depends_on:
      - spark-master
    deploy:
      resources:
        limits:
          memory: 2g
    networks: [football_net]
    restart: unless-stopped

networks:
  football_net:
    name: football_net
    driver: bridge

volumes:
  clickhouse_data:
  clickhouse_logs:
